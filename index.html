<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>四科のまとめ フラッシュカード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Meiryo UI', 'メイリオ', sans-serif; background: #F0F2F5; color: #333; min-height: 100vh; }

    header { background: #C00000; color: white; padding: 14px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.25); }
    header h1 { font-size: 17px; font-weight: bold; }
    header p { font-size: 11px; opacity: 0.8; margin-top: 2px; }

    .tabs { display: flex; background: white; border-bottom: 2px solid #E0E0E0; overflow-x: auto; }
    .tab { flex: 1; min-width: 70px; padding: 11px 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #888; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
    .tab:hover { color: #C00000; background: #FFF5F5; }
    .tab.active { color: #C00000; border-bottom-color: #C00000; }
    .tab .cnt { font-size: 10px; background: #EEE; color: #888; padding: 1px 5px; border-radius: 8px; margin-left: 4px; }
    .tab.active .cnt { background: #FFDDDD; color: #C00000; }
    .tab.disabled { opacity: 0.4; cursor: not-allowed; }

    .filter-bar { background: white; border-bottom: 1px solid #E8E8E8; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    .filter-info { font-size: 12px; color: #666; }
    .filter-info strong { color: #C00000; }
    .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .fbtn { padding: 5px 12px; border: 1.5px solid #CCC; border-radius: 16px; background: white; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.2s; }
    .fbtn.active { background: #C00000; color: white; border-color: #C00000; }
    .review-banner { background: #FFF3CD; border-left: 3px solid #FFA000; padding: 7px 16px; font-size: 12px; color: #664D03; display: none; }
    .review-banner.show { display: block; }

    .main { max-width: 680px; margin: 0 auto; padding: 16px; }

    .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .prog-text { font-size: 13px; color: #666; white-space: nowrap; min-width: 50px; }
    .prog-bar { flex: 1; height: 5px; background: #E0E0E0; border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: #C00000; border-radius: 3px; transition: width 0.4s; }
    .badges { display: flex; gap: 6px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
    .badge-ok { background: #E3F2FD; color: #0060A8; }
    .badge-ng { background: #FFEBEE; color: #C00000; }

    .section-divider { background: #E8ECF0; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: bold; color: #666; margin-bottom: 10px; text-align: center; }

    /* フリップカード */
    .scene { width: 100%; perspective: 1200px; margin-bottom: 16px; min-height: 300px; }
    .card-flip {
      width: 100%; min-height: 300px; position: relative;
      transform-style: preserve-3d; transition: transform 0.55s ease; cursor: pointer;
    }
    .card-flip.flipped { transform: rotateY(180deg); }
    .card-front, .card-back {
      position: absolute; width: 100%; min-height: 300px;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 14px; padding: 24px 22px; box-shadow: 0 3px 16px rgba(0,0,0,0.13);
      display: flex; flex-direction: column;
    }
    .card-front { background: white; }
    .card-back { background: #0060A8; transform: rotateY(180deg); color: white; }

    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .card-section { font-size: 11px; color: #C00000; font-weight: bold; background: #FFECEC; padding: 3px 9px; border-radius: 10px; }
    .card-type-badge { font-size: 10px; color: #999; }
    .review-mark { background: #C00000; color: white; font-size: 10px; padding: 2px 7px; border-radius: 8px; }

    .card-q { font-size: 19px; line-height: 1.75; color: #1A1A1A; flex: 1; display: flex; align-items: center; padding: 4px 0; word-break: normal; overflow-wrap: break-word; }
    .blank { display: inline-block; border-bottom: 2.5px solid #C00000; min-width: 64px; background: #FFF0F0; border-radius: 3px; padding: 0 6px; margin: 0 3px; color: transparent; }
    .card-hint { font-size: 12px; color: #BBB; margin-top: 8px; }
    .card-tap { font-size: 12px; color: #C00000; text-align: center; margin-top: 14px; opacity: 0.65; }

    .back-q { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
    .back-answer { font-size: 34px; font-weight: bold; color: white; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; line-height: 1.45; padding: 8px 0; word-break: normal; overflow-wrap: break-word; }
    .back-memo { font-size: 13px; color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 12px; margin: 0 0 10px 0; line-height: 1.6; border-left: 3px solid rgba(255,255,255,0.4); }
    .back-actions { display: flex; gap: 10px; margin-top: 14px; }
    .btn-ok { flex: 1; padding: 13px; background: white; color: #0060A8; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-ok:active { opacity: 0.8; }
    .btn-ng { flex: 1; padding: 13px; background: #C00000; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn-ng:active { opacity: 0.8; }

    .nav-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 12px; }
    .btn-nav { padding: 10px 18px; background: white; border: 1.5px solid #DDD; border-radius: 8px; cursor: pointer; font-size: 15px; font-family: inherit; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
    .btn-nav:not(:disabled):hover { background: #F5F5F5; }
    .nav-info { font-size: 13px; color: #888; min-width: 60px; text-align: center; }

    .empty { background: white; border-radius: 14px; padding: 56px 20px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .empty h3 { font-size: 22px; color: #0060A8; margin-bottom: 10px; }
    .empty p { color: #888; font-size: 14px; margin-bottom: 22px; line-height: 1.6; }
    .btn-restart { padding: 12px 24px; background: #0060A8; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; margin: 4px; }
    .btn-restart-r { padding: 12px 24px; background: #C00000; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; margin: 4px; }

    .reset-row { text-align: center; margin-top: 10px; }
    .btn-reset { background: none; border: 1px solid #CCC; color: #AAA; padding: 6px 14px; border-radius: 16px; font-size: 11px; cursor: pointer; font-family: inherit; }

    @media (max-width: 500px) {
      .card-q { font-size: 16px; }
      .back-answer { font-size: 26px; }
      .main { padding: 10px; }
    }

    /* ルビ（読み仮名）スタイル */
    ruby { display: inline; }
    rt { font-size: 0.55em; line-height: 1; color: #888; }
    .card-back rt { color: rgba(255,255,255,0.65); }
  </style>
</head>
<body>

<header>
  <h1>📚 四科のまとめ フラッシュカード</h1>
  <p>四谷大塚 ／ タップしてめくる ／ スワイプで前後移動</p>
</header>

<div class="tabs" id="tabs"></div>

<div class="filter-bar">
  <div class="filter-info" id="filterInfo">読み込み中...</div>
  <div class="filter-btns">
    <button class="fbtn active" id="fbtnAll" onclick="setMode('all')">全問</button>
    <button class="fbtn" id="fbtnReview" onclick="setMode('review')">要復習のみ</button>
  </div>
</div>
<div class="filter-bar" id="unitBar" style="padding-top:4px;padding-bottom:4px;">
  <div class="filter-info" style="font-size:11px;color:#888;white-space:nowrap;">単元：</div>
  <div class="filter-btns" id="unitBtns"></div>
</div>
<div class="review-banner" id="reviewBanner">📌 要復習モード：✗ をつけた問題のみ表示</div>

<div class="main">
  <div class="progress-row">
    <div class="prog-text" id="progText">- / -</div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="badges">
      <span class="badge badge-ok" id="badgeOk">✓ 0</span>
      <span class="badge badge-ng" id="badgeNg">✗ 0</span>
    </div>
  </div>

  <div class="section-divider" id="sectionDivider" style="display:none"></div>

  <div class="scene" id="scene">
    <div class="card-flip" id="cardFlip" onclick="flipCard()">
      <div class="card-front">
        <div class="card-meta">
          <span class="card-section" id="cfSection"></span>
          <span class="card-type-badge" id="cfType"></span>
        </div>
        <div class="card-q" id="cfQ"></div>
        <div class="card-hint" id="cfHint"></div>
        <div class="card-tap">▼ タップして答えを確認</div>
      </div>
      <div class="card-back">
        <div class="back-q" id="cbQ"></div>
        <div class="back-answer" id="cbAnswer"></div>
        <div class="back-memo" id="cbMemo" style="display:none;"></div>
        <div class="back-actions">
          <button class="btn-ok" onclick="mark('ok',event)">わかった ✓</button>
          <button class="btn-ng" onclick="mark('ng',event)">要復習 ✗</button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn-nav" id="btnPrev" onclick="go(-1)">◀ 前へ</button>
    <span class="nav-info" id="navInfo"></span>
    <button class="btn-nav" id="btnNext" onclick="go(1)">次へ ▶</button>
  </div>

  <div class="empty" id="emptyScreen" style="display:none">
    <h3 id="emptyTitle">🎉 完了！</h3>
    <p id="emptyMsg"></p>
    <img id="stampImg" src="" alt="スタンプ" style="display:none; max-width:260px; width:80%; margin:18px auto 6px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.18);">
    <br>
    <button class="btn-restart" onclick="restart()">もう一度</button>
    <button class="btn-restart-r" onclick="setMode('review')">要復習のみ復習</button>
  </div>

  <div class="reset-row">
    <button class="btn-reset" onclick="resetSubject()">この科目の記録をリセット</button>
  </div>
</div>

  // 長い語から順にrubyに変換（FURIGANA配列は長い語が先頭）
  let result = text;
  FURIGANA.forEach(([word, reading]) => {
    // すでにrubyタグの中にある語は変換しない
    const regex = new RegExp(word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
    result = result.replace(regex, `<ruby>${word}<rt>${reading}</rt></ruby>`);
  });
  return result;
}

function init(){
  const tabs=document.getElementById("tabs"); tabs.innerHTML="";
  SUBJECTS.forEach((s,i)=>{
    const n=(CARDS_DATA[s]||[]).length;
    const t=document.createElement("button");
    t.className="tab"+(i===0?" active":"")+(n===0?" disabled":"");
    t.id="tab_"+s;
    t.innerHTML=s+`<span class="cnt">${n}</span>`;
    if(n>0) t.onclick=()=>selectSub(s);
    tabs.appendChild(t);
  });
  selectSub("社会");
}

function selectSub(s){
  sub=s; mode="all"; unit=0; idx=0; flipped=false;
  SUBJECTS.forEach(x=>{
    const t=document.getElementById("tab_"+x);
    if(t) t.className="tab"+(x===s?" active":"")+((CARDS_DATA[x]||[]).length===0?" disabled":"");
  });
  document.getElementById("fbtnAll").className="fbtn active";
  document.getElementById("fbtnReview").className="fbtn";
  document.getElementById("reviewBanner").className="review-banner";
  buildFiltered(); buildUnitButtons(); render();
}

function setMode(m){
  mode=m; idx=0; flipped=false;
  document.getElementById("fbtnAll").className="fbtn"+(m==="all"?" active":"");
  document.getElementById("fbtnReview").className="fbtn"+(m==="review"?" active":"");
  document.getElementById("reviewBanner").className="review-banner"+(m==="review"?" show":"");
  buildFiltered(); render();
}

function buildFiltered(){
  const all=CARDS_DATA[sub]||[];
  let cards=unit>0 ? all.filter((_,i)=>Math.floor(i/30)+1===unit) : all;
  filtered=mode==="review" ? cards.filter(c=>getSt(c.id)==="ng") : [...cards];
}

function buildUnitButtons(){
  const all=CARDS_DATA[sub]||[];
  const total=Math.ceil(all.length/30);
  let html=`<button class="fbtn${unit===0?' active':''}" onclick="setUnit(0)">全単元</button>`;
  for(let u=1;u<=total;u++){
    html+=`<button class="fbtn${unit===u?' active':''}" onclick="setUnit(${u})">第${u}単元</button>`;
  }
  document.getElementById("unitBtns").innerHTML=html;
}

function setUnit(u){
  unit=u; idx=0; flipped=false;
  buildFiltered(); buildUnitButtons(); render();
}

function updateBadges(){
  const all=CARDS_DATA[sub]||[];
  let ok=0,ng=0;
  all.forEach(c=>{const s=getSt(c.id);if(s==="ok")ok++;if(s==="ng")ng++;});
  document.getElementById("badgeOk").textContent="✓ "+ok;
  document.getElementById("badgeNg").textContent="✗ "+ng;
  const unitInfo=unit>0?`　第${unit}単元（${filtered.length}問）`:`　全${all.length}問`;
  document.getElementById("filterInfo").innerHTML=`<strong>${sub}</strong>${unitInfo}`;
}

function render(){
  updateBadges();
  const cf=document.getElementById("cardFlip");
  cf.style.transition="none";
  cf.classList.remove("flipped"); flipped=false;
  cf.getBoundingClientRect(); // reflow で即座に適用
  cf.style.transition="";
  const total=filtered.length;

  if(total===0){
    document.getElementById("scene").style.display="none";
    document.getElementById("emptyScreen").style.display="block";
    document.getElementById("emptyTitle").textContent=mode==="review"?"🎉 要復習なし！":"カードがありません";
    document.getElementById("emptyMsg").textContent=mode==="review"?"すべて「わかった」です！":"";
    document.getElementById("progText").textContent="0 / 0";
    document.getElementById("progFill").style.width="0%";
    document.getElementById("navInfo").textContent="";
    document.getElementById("btnPrev").disabled=true;
    document.getElementById("btnNext").disabled=true;
    document.getElementById("stampImg").style.display="none";
    return;
  }
  document.getElementById("scene").style.display="block";
  document.getElementById("emptyScreen").style.display="none";

  const i=Math.min(idx,total-1); idx=i;
  const card=filtered[i];
  const st=getSt(card.id);

  document.getElementById("progText").textContent=(i+1)+" / "+total;
  document.getElementById("progFill").style.width=(((i+1)/total)*100).toFixed(0)+"%";
  document.getElementById("navInfo").textContent=(i+1)+" / "+total;

  // 30枚ごとに単元番号を計算
  const allCards = CARDS_DATA[sub] || [];
  const globalIdx = allCards.findIndex(c => c.id === card.id);
  const unitNum = Math.floor(globalIdx / 30) + 1;
  const unitLabel = `第${unitNum}単元`;

  // セクション区切り（単元が変わるタイミングで表示）
  const sd=document.getElementById("sectionDivider");
  const prevGlobalIdx = i > 0 ? allCards.findIndex(c => c.id === filtered[i-1].id) : -1;
  const prevUnitNum = prevGlobalIdx >= 0 ? Math.floor(prevGlobalIdx / 30) + 1 : -1;
  if(i===0 || unitNum !== prevUnitNum){
    sd.innerHTML="📖 " + unitLabel + `<span style="font-size:10px;color:#999;margin-left:8px;">${card.section}</span>`;
    sd.style.display="block";
  } else { sd.style.display="none"; }

  // 前面：単元番号 + セクション名
  document.getElementById("cfSection").textContent=unitLabel;
  // タイプバッジ
  let typeBadge = "";
  if (st==="ng") {
    typeBadge = '<span class="review-mark">要復習</span>';
  } else if (card.type==="要点チェック") {
    typeBadge = "✅ 要点チェック";
  } else {
    typeBadge = "📝 穴埋め";
  }
  document.getElementById("cfType").innerHTML = typeBadge;
  document.getElementById("cfQ").innerHTML='<div style="width:100%">'+applyFurigana(card.question.replace(/＿＿＿/g,'<span class="blank">＿＿</span>'))+'</div>';
  document.getElementById("cfHint").textContent=card.hint||"";

  // 裏面
  document.getElementById("cbQ").innerHTML=applyFurigana(card.question.replace(/＿＿＿/g,"___"));
  document.getElementById("cbAnswer").innerHTML='<div style="width:100%;text-align:center">'+applyFurigana(card.answer)+'</div>';

  cf.style.outline=st==="ng"?"3px solid #C00000":"none";
  document.getElementById("btnPrev").disabled=i===0;
  document.getElementById("btnNext").disabled=i===total-1;

  // memo表示
  const memoEl = document.getElementById("cbMemo");
  if (card.memo) { memoEl.textContent = "💡 " + card.memo; memoEl.style.display = "block"; }
  else { memoEl.style.display = "none"; }
}

function flipCard(){
  const cf=document.getElementById("cardFlip");
  flipped=!flipped;
  cf.classList.toggle("flipped",flipped);
}

function mark(status,e){
  e.stopPropagation();
  if(filtered.length===0) return;
  setSt(filtered[idx].id,status);
  if(idx<filtered.length-1){
    idx++;
    if(mode==="review"&&status==="ok"){
      buildFiltered();
      if(filtered.length===0){render();return;}
      idx=Math.min(idx,filtered.length-1);
    }
  } else {
    if(mode==="review"){
      buildFiltered();
      if(filtered.length===0||idx>=filtered.length){ showDone(); return; }
    } else {
      showDone(); return;
    }
  }
  render();
}

function showDone(){
  const all=CARDS_DATA[sub]||[];
  let ok=0,ng=0;
  all.forEach(c=>{const s=getSt(c.id);if(s==="ok")ok++;if(s==="ng")ng++;});
  document.getElementById("scene").style.display="none";
  document.getElementById("emptyScreen").style.display="block";
  document.getElementById("emptyTitle").textContent="🎉 完了！";
  document.getElementById("emptyMsg").textContent=ok+"問 わかった ／ "+ng+"問 要復習";
  document.getElementById("progFill").style.width="100%";

  // スタンプ判定：filteredの全問がokなら「よくがんばったね」、1問でもng/未回答なら「もっと頑張ろう」
  const allOk = filtered.length > 0 && filtered.every(c => getSt(c.id) === "ok");
  const stampImg = document.getElementById("stampImg");
  stampImg.src = allOk ? "スタンプ/よくがんばったね.jpg" : "スタンプ/もっと頑張ろう.jpg";
  stampImg.style.display = "block";
}

function go(d){
  const n=idx+d;
  if(n<0||n>=filtered.length) return;
  idx=n; render();
}
function restart(){
  idx=0; mode="all"; unit=0;
  document.getElementById("fbtnAll").className="fbtn active";
  document.getElementById("fbtnReview").className="fbtn";
  document.getElementById("reviewBanner").className="review-banner";
  document.getElementById("stampImg").style.display="none";
  buildFiltered(); buildUnitButtons(); render();
}
function resetSubject(){
  if(!confirm("「"+sub+"」の記録をリセットしますか？")) return;
  const s=loadSt(); delete s[sub]; saveSt(s);
  buildFiltered(); render();
}

// スワイプ（左右で前後移動）
document.getElementById("scene").addEventListener("touchstart",e=>{touchX=e.touches[0].clientX;},{passive:true});
document.getElementById("scene").addEventListener("touchend",e=>{
  const d=touchX-e.changedTouches[0].clientX;
  if(Math.abs(d)>60&&!flipped) go(d>0?1:-1);
},{passive:true});

// キーボード
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") go(-1);
  else if(e.key==="ArrowRight") go(1);
  else if(e.key===" "||e.key==="Enter"){ e.preventDefault(); flipCard(); }
});

init();
</script>
</body>
</html>
